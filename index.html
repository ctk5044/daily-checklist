<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Daily Routine</title>
<style>
  :root {
    --ink: #2b2620;
    --paper: #f6f2ea;
    --paper-raised: #ffffff;
    --rule: #d8cfc0;
    --moss: #5c6e4f;
    --moss-deep: #3f4d36;
    --clay: #b5582f;
    --gold: #c79a3d;
    --shadow: 0 1px 2px rgba(43,38,32,0.08);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100%;
  }
  .app {
    max-width: 480px;
    margin: 0 auto;
    padding: env(safe-area-inset-top, 18px) 16px 40px;
    min-height: 100vh;
  }
  header {
    padding: 14px 4px 10px;
    text-align: center;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 14px;
  }
  header .eyebrow {
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--moss);
    font-weight: 600;
  }
  header h1 {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 24px;
    margin: 4px 0 2px;
    font-weight: 700;
    color: var(--moss-deep);
  }
  header .sub {
    font-size: 12.5px;
    color: #7a7164;
  }

  .daypicker {
    display: flex;
    overflow-x: auto;
    gap: 6px;
    padding: 4px 0 14px;
    scrollbar-width: none;
  }
  .daypicker::-webkit-scrollbar { display: none; }
  .daypicker button {
    flex: 0 0 auto;
    border: 1px solid var(--rule);
    background: var(--paper-raised);
    color: var(--ink);
    font-size: 13px;
    font-weight: 600;
    padding: 9px 14px;
    border-radius: 999px;
    cursor: pointer;
  }
  .daypicker button.active {
    background: var(--moss-deep);
    border-color: var(--moss-deep);
    color: var(--paper);
  }

  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    padding: 0 2px;
  }
  .progress-track {
    flex: 1;
    height: 7px;
    background: var(--rule);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--moss), var(--gold));
    border-radius: 99px;
    transition: width 0.35s ease;
    width: 0%;
  }
  .progress-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--moss-deep);
    white-space: nowrap;
    min-width: 40px;
    text-align: right;
  }

  ul.list { list-style: none; margin: 0; padding: 0; }
  li.item {
    background: var(--paper-raised);
    border: 1px solid var(--rule);
    border-radius: 12px;
    margin-bottom: 8px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 14px;
    cursor: pointer;
    transition: background 0.15s ease, opacity 0.15s ease;
  }
  li.item:active { background: #f0ece2; }
  li.item.checked {
    opacity: 0.55;
  }
  .checkbox {
    flex: 0 0 22px;
    width: 22px; height: 22px;
    border-radius: 7px;
    border: 2px solid var(--moss);
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s ease, border-color 0.15s ease;
  }
  li.item.checked .checkbox {
    background: var(--moss);
    border-color: var(--moss);
  }
  .checkbox svg {
    width: 13px; height: 13px;
    opacity: 0;
    transition: opacity 0.1s ease;
  }
  li.item.checked .checkbox svg { opacity: 1; }

  .text-wrap { flex: 1; min-width: 0; }
  .time {
    font-size: 11.5px;
    font-weight: 700;
    color: var(--clay);
    letter-spacing: 0.02em;
  }
  .label {
    font-size: 14.5px;
    line-height: 1.35;
    margin-top: 1px;
  }
  li.item.checked .label {
    text-decoration: line-through;
    text-decoration-color: #a39a8a;
  }

  .resetbar {
    margin-top: 22px;
    text-align: center;
  }
  .resetbar button {
    background: none;
    border: none;
    color: #948a7a;
    font-size: 12.5px;
    text-decoration: underline;
    cursor: pointer;
    padding: 8px;
  }

  .loading {
    text-align: center;
    padding: 40px 0;
    color: #8a8071;
    font-size: 13px;
  }
</style>
</head>
<body>
<div class="app" id="app">
  <header>
    <div class="eyebrow">Weekly Routine</div>
    <h1>Today's List</h1>
    <div class="sub" id="dateLabel"></div>
  </header>

  <div class="daypicker" id="daypicker"></div>

  <div class="progress-wrap">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-label" id="progressLabel">0/0</div>
  </div>

  <ul class="list" id="list">
    <li class="loading">Loading…</li>
  </ul>

  <div class="resetbar">
    <button id="resetBtn">Reset today's checkmarks</button>
  </div>
</div>

<script>
const DAYS = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];

const SCHEDULE = {
  Monday: [
    ["6:00 AM","Wake up"],
    ["6:15 AM","Workout: Push (45 min)"],
    ["7:15 AM","Breakfast"],
    ["7:45 AM","Journal"],
    ["8:00 AM","Commute to work (30 min)"],
    ["8:30 AM","Work begins"],
    ["12:30 PM","Lunch (30 min)"],
    ["1:00 PM","Work continues"],
    ["4:30 PM","Work ends / Commute home (30 min)"],
    ["5:00 PM","Daily Cleaning: Baseline tidy + Kitchen deep clean"],
    ["5:30 PM","Home improvement"],
    ["6:30 PM","Dinner"],
    ["7:15 PM","Catch up on shows"],
    ["8:15 PM","Watch fireflies (summer)"],
    ["9:00 PM","Reading"],
    ["9:45 PM","Wind down"],
    ["10:00 PM","Sleep"]
  ],
  Tuesday: [
    ["6:00 AM","Wake up"],
    ["6:15 AM","Workout: Cardio – Zone 2 (30–40 min)"],
    ["7:15 AM","Breakfast"],
    ["7:45 AM","Journal"],
    ["8:00 AM","Commute to work (30 min)"],
    ["8:30 AM","Work begins"],
    ["12:30 PM","Lunch (30 min)"],
    ["1:00 PM","Work continues"],
    ["4:30 PM","Work ends / Commute home (30 min)"],
    ["5:00 PM","Daily Cleaning: Baseline tidy + Bathroom(s)"],
    ["5:30 PM","Home improvement"],
    ["6:30 PM","Dinner"],
    ["7:15 PM","Catch up on shows"],
    ["8:15 PM","Watch fireflies (summer)"],
    ["9:00 PM","Reading"],
    ["9:45 PM","Wind down"],
    ["10:00 PM","Sleep"]
  ],
  Wednesday: [
    ["6:00 AM","Wake up"],
    ["6:15 AM","Workout: Yoga/Stretching – Mobility (30 min)"],
    ["7:15 AM","Breakfast"],
    ["7:45 AM","Journal"],
    ["8:00 AM","Commute to work (30 min)"],
    ["8:30 AM","Work begins"],
    ["12:30 PM","Lunch (30 min)"],
    ["1:00 PM","Work continues"],
    ["4:30 PM","Work ends / Commute home (30 min)"],
    ["5:00 PM","Daily Cleaning: Baseline tidy + Vacuum/sweep floors"],
    ["5:30 PM","Home improvement"],
    ["6:30 PM","Dinner"],
    ["7:15 PM","Catch up on shows"],
    ["8:15 PM","Watch fireflies (summer)"],
    ["9:00 PM","Reading"],
    ["9:45 PM","Wind down"],
    ["10:00 PM","Sleep"]
  ],
  Thursday: [
    ["6:00 AM","Wake up"],
    ["6:15 AM","Workout: Pull (45 min)"],
    ["7:15 AM","Breakfast"],
    ["7:45 AM","Journal"],
    ["8:00 AM","Commute to work (30 min)"],
    ["8:30 AM","Work begins"],
    ["12:30 PM","Lunch (30 min)"],
    ["1:00 PM","Work continues"],
    ["4:30 PM","Work ends / Commute home (30 min)"],
    ["5:00 PM","Daily Cleaning: Baseline tidy + Dusting"],
    ["5:30 PM","Home improvement"],
    ["6:30 PM","Dinner"],
    ["7:15 PM","Catch up on shows"],
    ["8:15 PM","Watch fireflies (summer)"],
    ["9:00 PM","Reading"],
    ["9:45 PM","Wind down"],
    ["10:00 PM","Sleep"]
  ],
  Friday: [
    ["6:00 AM","Wake up"],
    ["6:15 AM","Workout: Legs (45 min)"],
    ["7:15 AM","Breakfast"],
    ["7:45 AM","Journal"],
    ["8:00 AM","Commute to work (30 min)"],
    ["8:30 AM","Work begins"],
    ["12:30 PM","Lunch (30 min)"],
    ["1:00 PM","Work continues"],
    ["4:30 PM","Work ends / Commute home (30 min)"],
    ["5:00 PM","Daily Cleaning: Baseline tidy + Laundry"],
    ["5:30 PM","Home improvement"],
    ["6:30 PM","Dinner"],
    ["7:15 PM","Catch up on shows"],
    ["8:15 PM","Watch fireflies (summer)"],
    ["9:00 PM","Reading"],
    ["9:45 PM","Wind down"],
    ["10:00 PM","Sleep"]
  ],
  Saturday: [
    ["6:00 AM","Wake up"],
    ["6:15 AM","Workout: Cardio – Intervals (30–40 min)"],
    ["7:15 AM","Breakfast"],
    ["7:45 AM","Journal"],
    ["5:00 PM","Daily Cleaning: Baseline tidy + Bedroom tidy + change sheets"],
    ["5:30 PM","Home improvement"],
    ["6:30 PM","Dinner"],
    ["7:15 PM","Catch up on shows"],
    ["8:15 PM","Watch fireflies (summer)"],
    ["9:00 PM","Reading"],
    ["9:45 PM","Wind down"],
    ["10:00 PM","Sleep"]
  ],
  Sunday: [
    ["6:00 AM","Wake up"],
    ["6:15 AM","Workout: Yoga/Stretching – Recovery (30 min)"],
    ["7:15 AM","Breakfast"],
    ["7:45 AM","Journal"],
    ["5:00 PM","Daily Cleaning: Baseline tidy + Living areas reset + trash/recycling"],
    ["5:30 PM","Home improvement"],
    ["6:30 PM","Dinner"],
    ["7:15 PM","Catch up on shows"],
    ["8:15 PM","Watch fireflies (summer)"],
    ["9:00 PM","Reading"],
    ["9:45 PM","Wind down"],
    ["10:00 PM","Sleep"]
  ]
};

let currentDay = DAYS[(new Date().getDay() + 6) % 7]; // Monday=0
let checkedState = {}; // { "Monday": [bool, bool, ...] }
let storageReady = false;

function todayDateString() {
  const today = new Date();
  return today.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' });
}

function storageKey() {
  // Key by ISO week (Mon start) + day name, so it resets naturally week to week
  const d = new Date();
  const monday = new Date(d);
  monday.setDate(d.getDate() - ((d.getDay() + 6) % 7));
  const weekStr = monday.toISOString().slice(0,10);
  return `checklist:${weekStr}:${currentDay}`;
}

function loadDay(day) {
  currentDay = day;
  renderDayPicker();
  document.getElementById('dateLabel').textContent = todayDateString();

  const items = SCHEDULE[day];
  let saved = null;
  try {
    const raw = localStorage.getItem(storageKey());
    if (raw) saved = JSON.parse(raw);
  } catch (e) {
    saved = null;
  }
  if (!saved || saved.length !== items.length) {
    saved = items.map(() => false);
  }
  checkedState[day] = saved;
  renderList();
}

function saveDay() {
  try {
    localStorage.setItem(storageKey(), JSON.stringify(checkedState[currentDay]));
  } catch (e) {
    console.error('Storage save failed', e);
  }
}

function renderDayPicker() {
  const wrap = document.getElementById('daypicker');
  wrap.innerHTML = '';
  DAYS.forEach(day => {
    const btn = document.createElement('button');
    btn.textContent = day.slice(0,3);
    if (day === currentDay) btn.classList.add('active');
    btn.onclick = () => loadDay(day);
    wrap.appendChild(btn);
  });
}

function renderList() {
  const items = SCHEDULE[currentDay];
  const state = checkedState[currentDay];
  const list = document.getElementById('list');
  list.innerHTML = '';

  items.forEach((item, idx) => {
    const li = document.createElement('li');
    li.className = 'item' + (state[idx] ? ' checked' : '');
    li.innerHTML = `
      <div class="checkbox">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>
      <div class="text-wrap">
        <div class="time">${item[0]}</div>
        <div class="label">${item[1]}</div>
      </div>
    `;
    li.onclick = () => {
      state[idx] = !state[idx];
      li.classList.toggle('checked');
      updateProgress();
      saveDay();
    };
    list.appendChild(li);
  });
  updateProgress();
}

function updateProgress() {
  const state = checkedState[currentDay];
  const total = state.length;
  const done = state.filter(Boolean).length;
  const pct = total ? Math.round((done/total)*100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${done}/${total}`;
}

document.getElementById('resetBtn').onclick = () => {
  const items = SCHEDULE[currentDay];
  checkedState[currentDay] = items.map(() => false);
  renderList();
  saveDay();
};

loadDay(currentDay);
</script>
</body>
</html>
